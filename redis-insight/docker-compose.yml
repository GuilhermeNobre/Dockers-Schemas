services:
  redis-stack:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      # Persist data in a named volume
      - redis_data:/data
    # Optional: configure persistence with environment variable
    environment:
      REDIS_ARGS: "--appendonly yes"

# Define named volumes
volumes:
  redis_data:
    driver: local